# Copy this to config.yaml and edit. config.yaml is gitignored (it points at your
# personal archive). Everything person-specific lives here — no values are hardcoded
# in the scripts, so anyone can run this pipeline on their own Twitter/X export.

# --- Who ---
# Your X handle (without @) and numeric account id. The account id is in
# twitter-archive/data/account.js ("accountId"). Used to detect self-reply threads.
handle: your_handle
account_id: "000000000"

# --- Paths ---
paths:
  archive_dir: twitter-archive/data   # where your export's data/ folder lives
  data_dir: data                      # all generated artifacts go here (gitignored)
  runs_dir: runs                      # eval scorecards

# --- Filtering / cleaning (step 02) ---
filter:
  languages: [en]            # keep only these langs; [] = keep all
  include_retweets: false    # true = keep RTs (tagged is_own:false) to enrich theme
                             # discovery ONLY; they're never labeled or trained on
  include_likes: false       # same idea for liked tweets (a strong interest signal)
  max_likes: 5000            # cap likes so they don't swamp your own tweets (0 = all)
  drop_replies_to_others: false  # keep replies (we curate by quality later)
  min_chars: 12              # drop very short tweets after cleaning
  strip_urls: true           # remove ALL urls from text (a generated url is always a hallucination)
  expand_urls: false         # (ignored when strip_urls is true) replace t.co with expanded_url
  strip_trailing_media_url: true   # when expanding urls, drop the auto-appended media (pic/video) link
  strip_leading_mentions: true   # drop the "@a @b" addressing prefix on replies (not voice)

# --- Theme discovery (step 03) ---
themes:
  embed_model: nomic-embed-text   # an Ollama embedding model (`ollama pull nomic-embed-text`)

  # Dimensionality reduction before clustering (high-dim embeds cluster poorly).
  reduce:
    method: pca                   # pca | umap | none
    pca:
      dims: 50                    # PCA target dims
    umap:                         # nonlinear; tighter, better-separated clusters, less noise
      components: 5               # output dims
      neighbors: 15               # local/global balance — smaller = finer, more topics
      min_dist: 0.0               # point packing — low = tighter blobs, better for clustering

  # Clustering algorithm.
  cluster:
    algorithm: hdbscan            # hdbscan | kmeans
    hdbscan:
      min_cluster_size: 15        # min tweets to form a cluster; bigger = fewer, broader
    kmeans:
      k: 25                       # number of clusters

  # LLM names each cluster -> subjects.txt for you to review/merge.
  naming:
    enabled: true
    reps_per_cluster: 15          # representative tweets shown to the namer per cluster

  # Stage 03b: consolidate the fine clusters into higher-level themes with the LLM —
  # it proposes a taxonomy from the labels, then assigns each cluster to a theme using
  # a few real example tweets (semantic, not embedding geometry).
  merge:
    enabled: true
    distance_threshold: 0.58  # group fine clusters by label+example similarity (cosine);
                              # lower = more, finer themes; higher = fewer, broader
    max_theme_share: 0.08     # any theme bigger than this fraction of all tweets is
                              # recursively re-split at a tighter threshold (0 = off), so
                              # a dominant topic can't stay one giant blob
    examples_per_label: 3     # tweets per label used for grouping context + naming

# --- Scoring + shortlist (step 04) ---
score:
  llm_model: qwen2.5:7b      # local Ollama instruct model used ONLY as a scorer/filter
  use_llm: true              # false = heuristics only
  llm_score_pool: 1500       # only LLM-score the top-N by heuristic (saves time)
  shortlist_size: 300        # how many tweets to surface for hand-labeling
  balance_across_clusters: true   # true = round-robin clusters for broad coverage; false = global top-N

# --- Dataset build (step 06) ---
dataset:
  label_target: 300          # how many hand-labeled pairs you're aiming for (display only)
  # System persona prepended to instruction pairs. Describe yourself briefly.
  persona: "You are {handle}, replying on X. Be concise, opinionated, and in your own voice."
  voice_layer: true          # include raw tweets (no prompt) to reinforce style
  voice_pool_size: 3000      # max raw tweets in the voice layer
  voice_min_score: 0         # min heuristic score for a tweet to enter the voice layer
  voice_max_repeat: 10       # ceiling on how many times a verbatim catchphrase (dup_count>1)
                             # is repeated in the voice layer; 0 = unlimited, 1 = no emphasis
  voice_dedup_threshold: 0.8 # drop voice tweets with >= this token-Jaccard to an eval ref
  eval_holdout: 20           # instruction pairs held out for eval

# --- Training (step 07) ---
train:
  base_model: unsloth/Qwen3-1.7B   # swap to a bigger model to scale up; everything else unchanged
  load_in_4bit: false             # QLoRA 4-bit: required to fit ~8B+ models on 16GB VRAM
                                  # (small models train fine in 16-bit; leave false)
  max_seq_len: 1024               # max tokens per example; longer sequences are truncated
  epochs: 3                       # passes over the data; more can overfit a small set
  learning_rate: 2.0e-4           # LoRA learning rate (1e-4–2e-4 is the usual range)
  lora_rank: 16                   # LoRA rank — adapter capacity; higher = more trainable params
  lora_alpha: 16                  # LoRA scaling factor; commonly set equal to lora_rank
  batch_size: 8                   # examples per GPU step (lower if you hit CUDA OOM)
  grad_accum: 2                   # steps to accumulate; effective batch = batch_size * grad_accum
  seed: 42                        # RNG seed for reproducible runs
  output_dir: data/model          # LoRA adapter, checkpoints, and GGUF export land here

# --- Export / deploy (step 08) ---
export:
  gguf_quant: q4_k_m           # llama.cpp quantization for the exported GGUF (q4_k_m = 4-bit)
  ollama_model_name: myvoice   # name for the finetuned model in Ollama

# --- Eval (step 09) ---
eval:
  base_model_tag: qwen3:1.7b   # Ollama tag of the untuned base for side-by-side comparison

# --- Ask / RAG (step 10) ---
rag:
  top_k: 8              # how many of your own tweets to retrieve as grounding per question
  show_sources: true    # print the retrieved tweets under each answer
